name: Setup
description: Install Nix, devenv, and npm dependencies

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm

    - name: Install Nix
      uses: cachix/install-nix-action@v31

    - name: Enable devenv cache
      uses: cachix/cachix-action@v16
      with:
        name: devenv

    - name: Install devenv
      shell: bash
      run: nix profile add nixpkgs#devenv

    - name: Pre-warm devenv environment
      shell: bash
      run: cd test/workspace && devenv test

    - name: Install dependencies
      shell: bash
      run: npm ci
